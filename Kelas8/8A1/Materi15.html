<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 15</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu menghitung biaya parkir, uang jajan, atau tabungan dengan cara membuat perkiraan terlebih dahulu?',
  'Bagaimana caramu menentukan hubungan antara dua hal agar perhitungan menjadi lebih mudah dan teratur?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Perhitungan biaya parkir berdasarkan lama waktu parkir.',
  'Tabungan mingguan dengan jumlah simpanan tetap setiap minggu.',
  'Biaya pembelian barang berdasarkan jumlah yang dibeli.',
  'Jarak tempuh kendaraan yang bergantung pada lama perjalanan.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyusun dan menyelesaikan masalah kontekstual yang berkaitan dengan persamaan garis lurus serta menginterpretasikan hasilnya dalam konteks kehidupan nyata.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati beberapa masalah kontekstual yang melibatkan dua besaran.',
  'Siswa berdiskusi dalam kelompok untuk menentukan hubungan linear dari masalah tersebut.',
  'Siswa menyusun model matematika sederhana dari situasi nyata yang diberikan.',
  'Siswa mengerjakan latihan menyelesaikan masalah kontekstual secara mandiri atau berkelompok.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Mengapa Persamaan Garis Lurus Penting dalam Kehidupan Nyata:',
  'Persamaan garis lurus digunakan untuk memodelkan hubungan linear antara dua variabel, seperti:',
  'Biaya parkir per jam',
  'Jarak tempuh terhadap waktu',
  'Biaya produksi terhadap jumlah barang',
  'Langkah Menyelesaikan Masalah Kontekstual:',
  'Pahami konteks dan informasi yang diberikan.',
  'Identifikasi variabel dan bentuk hubungan linear.',
  'Susun persamaan garis lurus: y = mx + c',
  'Gunakan persamaan untuk menjawab pertanyaan.'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Biaya parkir di sebuah tempat adalah Rp5.000 untuk jam pertama dan Rp2.000 untuk setiap jam berikutnya.',
  'Pertanyaan:',
  'Susun persamaan untuk menghitung total biaya parkir y setelah x jam.',
  'Hitung biaya parkir untuk 4 jam.',
  'Berapa jam seseorang parkir jika membayar Rp13.000?',
  'Penyelesaian:',
  'Untuk x = 1 → biaya = Rp5.000',
  'Untuk x > 1 → biaya = Rp5.000 + Rp2.000(x - 1)',
  'Sederhanakan: y = 2000x + 3000',
  'a. Persamaan: y = 2000x + 3000',
  'b. y = 2000(4) + 3000 = 8000 + 3000 = 11.000',
  'c. 13.000 = 2000x + 3000 ⇒ x = 5',
  'Contoh Soal 2:',
  'Seorang siswa menabung Rp10.000 setiap minggu. Tabungan awalnya Rp50.000.',
  'Pertanyaan:',
  'Susun persamaan untuk menghitung jumlah tabungan y setelah x minggu.',
  'Berapa tabungan setelah 8 minggu?',
  'Setelah berapa minggu tabungan mencapai Rp150.000?',
  'Penyelesaian:',
  'Persamaan: y = 10.000x + 50.000',
  'b. y = 10.000(8) + 50.000 = 130.000',
  'c. 150.000 = 10.000x + 50.000 ⇒ x = 10'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Seorang pengrajin menjual kerajinan tangan seharga Rp25.000 per buah. Biaya tetap produksi adalah Rp100.000.',
  'Susun persamaan untuk total pendapatan y terhadap jumlah barang x.',
  'Hitung pendapatan jika menjual 10 barang.',
  'Berapa barang yang harus dijual agar pendapatan mencapai Rp350.000?',
  'Buat satu soal kontekstual sendiri yang melibatkan hubungan linear, lalu:',
  'Susun persamaannya',
  'Jawab dua pertanyaan berdasarkan konteks tersebut'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa manfaat menyusun persamaan garis lurus dari situasi nyata?',
  'Bagaimana kamu menentukan nilai m dan c dari soal cerita?',
  'Apakah kamu bisa membuat sendiri soal kontekstual dan menyelesaikannya?',
  'Siswa diminta menuliskan satu situasi nyata dari kehidupan mereka lalu menyusun persamaan garis lurus dan menjawab satu pertanyaan berdasarkan situasi tersebut.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
