<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 11</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu melihat dua titik lokasi pada peta dan membayangkan garis yang menghubungkannya?',
  'Jika kamu tahu kemiringan suatu jalan dan satu titik yang dilaluinya, apakah kamu bisa menggambarkan jalannya?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Hubungan antara jarak tempuh dan waktu pada perjalanan dengan kecepatan tetap.',
  'Grafik biaya parkir yang bertambah secara tetap setiap jam.',
  'Jalur lurus pada peta yang menghubungkan dua lokasi tertentu.',
  'Pertumbuhan tinggi badan yang bertambah secara teratur dari tahun ke tahun.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyusun persamaan garis lurus jika diketahui dua titik atau satu titik dan gradien, serta mengaitkannya dengan konteks kehidupan nyata.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati contoh pasangan titik atau informasi kemiringan dari situasi sehari-hari.',
  'Siswa berdiskusi berkelompok untuk menentukan garis lurus yang dapat mewakili hubungan tersebut.',
  'Siswa menyusun bentuk hubungan dalam model garis lurus berdasarkan data yang tersedia.',
  'Siswa mengerjakan latihan untuk membentuk persamaan garis lurus dari dua titik atau satu titik dan gradien.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  '1. Bentuk Umum Persamaan Garis Lurus:',
  'y = mx + c',
  '- m = gradien (kemiringan garis)',
  '- c = titik potong dengan sumbu-y',
  '2. Menentukan Persamaan Garis dari Dua Titik:',
  'Diketahui dua titik: (x₁, y₁) dan (x₂, y₂)',
  'Hitung gradien: m = (y₂ - y₁) / (x₂ - x₁)',
  'Gunakan salah satu titik dan gradien ke dalam rumus: y - y₁ = m(x - x₁), lalu ubah ke bentuk y = mx + c',
  '3. Menentukan Persamaan Garis dari Satu Titik dan Gradien:',
  'Diketahui titik (x₁, y₁) dan gradien m',
  'Gunakan rumus: y - y₁ = m(x - x₁), lalu ubah ke bentuk umum.'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Tentukan persamaan garis yang melalui titik A(2, 3) dan B(4, 7).',
  'Penyelesaian:',
  'm = (7 - 3) / (4 - 2) = 4 / 2 = 2',
  'Gunakan titik A(2, 3):',
  'y - 3 = 2(x - 2) ⇒ y = 2x - 1',
  'Jawaban: y = 2x - 1',
  'Contoh Soal 2:',
  'Tentukan persamaan garis yang melalui titik (1, 5) dengan gradien m = -3.',
  'Penyelesaian:',
  'y - 5 = -3(x - 1) ⇒ y = -3x + 8',
  'Jawaban: y = -3x + 8'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Tentukan persamaan garis yang melalui titik (0, 4) dan (2, 8).',
  'Tentukan persamaan garis yang melalui titik (3, -2) dan gradien 5.',
  'Tentukan persamaan garis yang melalui titik (1, 2) dan (4, 2).',
  'Buat satu soal kontekstual yang melibatkan dua titik, lalu selesaikan.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa langkah pertama yang kamu lakukan saat menyusun persamaan garis?',
  'Apa perbedaan antara menyusun persamaan dari dua titik dan dari satu titik dan gradien?',
  'Bagaimana kamu bisa menggunakan konsep ini dalam kehidupan nyata?',
  'Siswa diminta membuat satu contoh situasi nyata yang dapat dimodelkan dengan persamaan garis lurus, lalu menyusun persamaannya.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
