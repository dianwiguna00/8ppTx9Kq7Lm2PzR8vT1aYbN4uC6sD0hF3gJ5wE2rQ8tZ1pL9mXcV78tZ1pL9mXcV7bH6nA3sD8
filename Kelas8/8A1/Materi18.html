<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 18</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu mencoba menyelesaikan dua informasi yang saling berkaitan dengan mengganti salah satu nilai ke nilai lainnya?',
  'Menurutmu, kapan cara mengganti suatu nilai dapat mempermudah penyelesaian masalah?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Menentukan harga satu barang dengan memasukkan harga barang lain yang sudah diketahui.',
  'Menghitung jumlah uang atau barang ketika salah satu nilainya sudah ditentukan.',
  'Menyelesaikan masalah belanja dengan satu hubungan harga yang sudah diketahui.',
  'Menentukan umur seseorang jika diketahui hubungan usia dengan orang lain.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyelesaikan sistem persamaan linear dua variabel menggunakan metode substitusi dan menginterpretasikan solusi dalam konteks masalah.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati contoh masalah kontekstual yang melibatkan dua variabel.',
  'Siswa berdiskusi berkelompok untuk memilih persamaan yang akan diubah bentuknya.',
  'Siswa menyubstitusikan salah satu variabel ke persamaan lain untuk menemukan solusi.',
  'Siswa mengerjakan latihan menyelesaikan masalah SPLDV dengan metode substitusi secara mandiri atau berkelompok.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Apa itu Metode Substitusi:',
  'Metode substitusi adalah cara menyelesaikan SPLDV dengan mengganti salah satu variabel dari satu persamaan ke dalam persamaan lainnya.',
  'Langkah-langkah:',
  'Pilih salah satu persamaan dan ubah menjadi bentuk salah satu variabel (misalnya x = ... atau y = ...).',
  'Substitusikan bentuk tersebut ke persamaan lainnya.',
  'Selesaikan persamaan satu variabel.',
  'Substitusikan kembali untuk mencari variabel lainnya.',
  'Tulis solusi sebagai pasangan (x, y).'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Selesaikan SPLDV berikut dengan metode substitusi:',
  'x + y = 10',
  'x - y = 4',
  'Penyelesaian:',
  '1. Dari persamaan pertama: x = 10 - y',
  '2. Substitusi ke persamaan kedua:',
  '10 - y - y = 4 → 10 - 2y = 4 → 2y = 6 → y = 3',
  '3. Substitusi ke x = 10 - y: x = 7',
  'Jawaban: (x, y) = (7, 3)',
  'Contoh Soal 2:',
  'Selesaikan SPLDV berikut:',
  '2x + y = 11',
  'x = 3y',
  'Penyelesaian:',
  '1. Substitusi x = 3y ke persamaan pertama:',
  '2(3y) + y = 11 → 7y = 11 → y = 11/7',
  '2. x = 3 × 11/7 = 33/7',
  'Jawaban: (x, y) = (33/7, 11/7)'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Selesaikan SPLDV berikut:',
  'x + 2y = 12',
  'x = y + 4',
  'Selesaikan SPLDV berikut:',
  '3x - y = 7',
  'y = 2x + 1',
  'Buat satu soal kontekstual (misalnya harga barang atau jumlah siswa), susun SPLDV, lalu selesaikan dengan metode substitusi.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa langkah yang paling mudah dan paling menantang dalam metode substitusi?',
  'Bagaimana metode substitusi membantu menyelesaikan masalah nyata?',
  'Apakah kamu bisa menjelaskan metode ini kepada temanmu?',
  'Siswa diminta membuat satu SPLDV dari situasi nyata, menyelesaikannya dengan metode substitusi, dan menjelaskan prosesnya secara tertulis atau lisan.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
