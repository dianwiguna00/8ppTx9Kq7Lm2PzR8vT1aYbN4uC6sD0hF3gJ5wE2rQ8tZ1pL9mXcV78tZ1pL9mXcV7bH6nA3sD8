<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 16</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu melihat grafik lalu mencoba menebak arti angka atau titik yang ada di dalamnya?',
  'Menurutmu, bagaimana grafik bisa membantu memahami suatu situasi tanpa harus membaca penjelasan panjang?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Grafik biaya parkir yang menunjukkan hubungan antara waktu parkir dan total biaya.',
  'Grafik tabungan yang menunjukkan pertambahan uang setiap minggu.',
  'Grafik jarak tempuh kendaraan terhadap waktu perjalanan.',
  'Grafik pertumbuhan tinggi badan anak dari tahun ke tahun.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu membaca dan menginterpretasikan grafik garis lurus yang merepresentasikan situasi nyata, serta menjelaskan makna titik, gradien, dan bentuk grafik dalam konteks tersebut.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati beberapa grafik garis lurus yang menggambarkan situasi kehidupan nyata.',
  'Siswa berdiskusi berkelompok untuk menjelaskan arti titik, garis, dan arah grafik yang diamati.',
  'Siswa menghubungkan informasi pada grafik dengan situasi nyata yang sesuai.',
  'Siswa mengerjakan latihan menafsirkan informasi sederhana dari grafik yang diberikan.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Apa itu Interpretasi Grafik:',
  'Interpretasi grafik berarti memahami arti dari grafik dalam konteks kehidupan nyata, seperti:',
  'Titik potong sumbu-y → nilai awal',
  'Gradien → laju perubahan',
  'Titik pada grafik → hubungan antara dua variabel',
  'Contoh Situasi Nyata:',
  'Grafik biaya parkir terhadap waktu',
  'Grafik pertumbuhan tinggi badan terhadap usia',
  'Grafik jarak tempuh terhadap waktu',
  'Contoh Grafik:',
  'Persamaan: y = 10x + 50',
  '- y = jumlah tabungan',
  '- x = minggu ke-x',
  'Interpretasi:',
  '- Titik (0, 50) → tabungan awal Rp50.000',
  '- Gradien 10 → tabungan bertambah Rp10.000 per minggu'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Grafik menunjukkan hubungan antara jumlah buku yang dibeli dan total harga.',
  'Persamaan: y = 25x',
  'Pertanyaan:',
  'Apa arti dari gradien 25?',
  'Berapa harga 4 buku?',
  'Jika seseorang membayar Rp200.000, berapa buku yang dibeli?',
  'Jawaban:',
  'a. Setiap buku seharga Rp25.000',
  'b. y = 25 × 4 = 100.000',
  'c. 200.000 = 25x ⇒ x = 8',
  'Contoh Soal 2:',
  'Grafik menunjukkan jarak tempuh kendaraan terhadap waktu.',
  'Persamaan: y = 60x',
  'Pertanyaan:',
  'Apa arti dari gradien 60?',
  'Berapa jarak tempuh dalam 3 jam?',
  'Jika kendaraan menempuh 180 km, berapa lama waktu yang dibutuhkan?',
  'Jawaban:',
  'a. Kendaraan menempuh 60 km per jam',
  'b. y = 60 × 3 = 180 km',
  'c. 180 = 60x ⇒ x = 3 jam'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Grafik menunjukkan biaya les privat: y = 75x + 50',
  'Apa arti dari angka 75 dan 50?',
  'Hitung biaya untuk 4 sesi les.',
  'Jika membayar Rp350.000, berapa sesi yang diikuti?',
  'Buat grafik dari situasi nyata (misalnya: konsumsi air per hari atau biaya transportasi), lalu:',
  'Susun persamaan garis lurus',
  'Interpretasikan gradien dan titik potong',
  'Jawab dua pertanyaan berdasarkan grafik'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa informasi yang bisa kamu peroleh dari grafik garis lurus?',
  'Bagaimana grafik membantu memahami hubungan antara dua variabel?',
  'Apakah kamu bisa membuat grafik dari situasi nyata dan menjelaskannya?',
  'Siswa diminta membuat grafik dari situasi kehidupan mereka lalu menjelaskan arti grafik tersebut secara tertulis atau lisan.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
