<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 6</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu memperhatikan hubungan antara nama siswa dan nomor induk siswa di sekolah?',
  'Apakah setiap siswa selalu memiliki satu nilai untuk satu mata pelajaran tertentu?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Hubungan antara siswa dan kelas tempat mereka belajar.',
  'Hubungan antara hari dan jadwal pelajaran di sekolah.',
  'Hubungan antara nomor rumah dan pemilik rumah.',
  'Hubungan antara siswa dan nilai ulangan yang diperoleh.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu memahami dan menjelaskan konsep relasi dan fungsi serta mengidentifikasi penerapannya dalam kehidupan sehari-hari.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati beberapa contoh pasangan data yang berkaitan dalam kehidupan sehari-hari.',
  'Siswa berdiskusi berkelompok untuk menentukan pasangan mana yang memiliki hubungan teratur.',
  'Siswa menyajikan hasil pengamatan dalam bentuk pasangan sederhana.',
  'Siswa mengerjakan latihan untuk mengelompokkan contoh relasi dan bukan relasi.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Apa itu Relasi:',
  'Relasi adalah hubungan antara dua himpunan. Misalnya, relasi antara siswa dan kelas yang mereka tempati.',
  'Apa itu Fungsi:',
  'Fungsi adalah relasi khusus di mana setiap anggota himpunan pertama (domain) berpasangan dengan tepat satu anggota himpunan kedua (kodomain).',
  'Contoh dalam Kehidupan Sehari-hari:',
  'Setiap siswa memiliki satu NIS → fungsi',
  'Setiap hari memiliki satu tanggal → fungsi',
  'Seseorang bisa memiliki lebih dari satu akun media sosial → bukan fungsi',
  'Istilah Penting:',
  'Domain: himpunan asal (input)',
  'Kodomain: himpunan tujuan (output)',
  'Range: hasil relasi (output yang benar-benar digunakan)'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Diberikan relasi antara siswa dan nilai ulangan mereka:',
  '- Siswa A → 80',
  '- Siswa B → 85',
  '- Siswa C → 90',
  'Pertanyaan:',
  'a. Apakah relasi ini merupakan fungsi?',
  'b. Tentukan domain dan range.',
  'Jawaban:',
  'a. Ya, karena setiap siswa memiliki satu nilai.',
  'b. Domain = {A, B, C}, Range = {80, 85, 90}',
  'Contoh Soal 2:',
  'Relasi antara hari dan kegiatan:',
  '- Senin → Matematika',
  '- Selasa → IPA',
  '- Rabu → Bahasa',
  '- Kamis → Matematika',
  '- Jumat → Seni',
  'Pertanyaan:',
  'a. Apakah relasi ini fungsi?',
  'b. Tentukan domain dan range.',
  'Jawaban:',
  'a. Ya, karena setiap hari hanya memiliki satu kegiatan.',
  'b. Domain = {Senin, Selasa, Rabu, Kamis, Jumat}, Range = {Matematika, IPA, Bahasa, Seni}'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Buat relasi antara siswa dan hobi mereka. Apakah relasi tersebut fungsi?',
  'Buat relasi antara nomor rumah dan pemilik rumah. Apakah relasi tersebut fungsi?',
  'Identifikasi relasi fungsi dalam kehidupan sekolah (misalnya: guru dan mata pelajaran yang diajarkan).'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa perbedaan antara relasi dan fungsi?',
  'Di mana kamu menemukan fungsi dalam kehidupan sehari-hari?',
  'Mengapa penting memahami konsep fungsi?',
  'Siswa diminta menuliskan satu contoh fungsi dari kehidupan mereka sendiri dan menjelaskan mengapa itu memenuhi syarat sebagai fungsi.'
 ]}
];


let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
