<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 26</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu menyelesaikan masalah nyata yang membutuhkan lebih dari satu langkah perhitungan?',
  'Bagaimana caramu bekerja sama dengan teman untuk memahami soal yang terasa kompleks?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Menyelesaikan masalah belanja yang melibatkan beberapa jenis barang dan informasi harga.',
  'Menganalisis data sederhana dari kehidupan sehari-hari seperti tabungan, jarak, atau waktu.',
  'Menghubungkan informasi dalam tabel, grafik, dan persamaan untuk menarik kesimpulan.',
  'Menyelesaikan studi kasus sederhana yang sering dijumpai di lingkungan sekitar.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyusun laporan sederhana tentang penerapan SPLDV dalam kehidupan sehari-hari.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati satu masalah kontekstual terpadu yang disajikan guru.',
  'Siswa berdiskusi dalam kelompok untuk mengidentifikasi informasi penting dalam masalah.',
  'Siswa menyelesaikan masalah secara bertahap dengan strategi yang disepakati bersama.',
  'Siswa mempresentasikan hasil penyelesaian dan menanggapi solusi dari kelompok lain.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Sistem Persamaan Linear Dua Variabel (SPLDV) digunakan untuk menyelesaikan masalah yang melibatkan dua kondisi atau dua variabel.',
  'Contoh penerapannya:',
  'Menentukan harga dua jenis barang.',
  'Menghitung jumlah dan harga tiket.',
  'Menyelesaikan masalah keuangan sederhana.'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Soal:',
  'Seorang pedagang menjual dua jenis buah: apel dan jeruk.',
  'Hari pertama: 3 kg apel dan 2 kg jeruk seharga Rp80.000.',
  'Hari kedua: 2 kg apel dan 4 kg jeruk seharga Rp100.000.',
  'Berapa harga per kg apel dan jeruk?',
  'Penyelesaian:',
  'Misalkan:',
  'x = harga per kg apel',
  'y = harga per kg jeruk',
  'Persamaan 1: 3x + 2y = 80.000',
  'Persamaan 2: 2x + 4y = 100.000',
  'Gunakan metode eliminasi atau substitusi untuk menyelesaikan.'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Sebuah bioskop menjual tiket dewasa dan anak-anak.',
  'Hari Senin: 5 tiket dewasa dan 3 tiket anak-anak = Rp215.000.',
  'Hari Selasa: 3 tiket dewasa dan 4 tiket anak-anak = Rp195.000.',
  'Tentukan harga tiket dewasa dan anak-anak.',
  'Sebuah toko menjual paket alat tulis.',
  'Paket A: 2 buku dan 3 pensil = Rp27.000.',
  'Paket B: 3 buku dan 2 pensil = Rp31.000.',
  'Tentukan harga sebuah buku dan sebuah pensil.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa manfaat SPLDV dalam kehidupan sehari-hari?',
  'Bagaimana strategi Anda dalam menyusun persamaan dari masalah kontekstual?',
  'Apa tantangan yang Anda hadapi saat menyelesaikan SPLDV?',
  'Bagaimana Anda bisa menggunakan SPLDV untuk membuat keputusan dalam kehidupan nyata?'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
