<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 13</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu melihat persamaan matematika lalu membayangkan bentuk grafiknya?',
  'Menurutmu, bagaimana cara menggambar grafik garis lurus hanya dari sebuah persamaan?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Grafik biaya parkir yang menunjukkan hubungan antara lama parkir dan total biaya.',
  'Grafik jarak tempuh kendaraan terhadap waktu perjalanan.',
  'Grafik pertumbuhan tinggi badan siswa dari usia ke usia.',
  'Grafik jumlah tabungan terhadap lama waktu menabung.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyajikan persamaan garis lurus dalam bentuk grafik di bidang koordinat kartesius dan menginterpretasikan bentuk grafik tersebut.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati beberapa persamaan garis lurus yang disajikan guru.',
  'Siswa berdiskusi berpasangan untuk menentukan pasangan titik dari setiap persamaan.',
  'Siswa menggambar grafik garis lurus berdasarkan pasangan titik yang diperoleh.',
  'Siswa mengerjakan latihan menggambar dan membaca grafik dari persamaan garis lurus.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  '1. Grafik Garis Lurus:',
  'Grafik dari persamaan garis lurus berbentuk garis yang memotong sumbu-x dan sumbu-y. Bentuk umum persamaan:',
  'y = mx + c',
  '- m = gradien (kemiringan garis)',
  '- c = titik potong dengan sumbu-y',
  '2. Langkah Menyajikan Grafik:',
  '1. Tentukan dua titik dari persamaan (misalnya dengan memilih dua nilai x dan menghitung y).',
  '2. Plot titik-titik tersebut di bidang koordinat.',
  '3. Hubungkan titik-titik dengan garis lurus.',
  'Contoh:',
  'Persamaan: y = 2x + 1',
  '- Jika x = 0 ⇒ y = 1 → titik (0,1)',
  '- Jika x = 2 ⇒ y = 5 → titik (2,5)',
  '- Hubungkan titik (0,1) dan (2,5) → garis lurus'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Gambarkan grafik dari persamaan y = -x + 3',
  'Penyelesaian:',
  '- Pilih dua nilai x:',
  'x = 0 ⇒ y = 3 → titik (0,3)',
  'x = 2 ⇒ y = 1 → titik (2,1)',
  '- Plot titik (0,3) dan (2,1), lalu hubungkan dengan garis lurus.',
  'Contoh Soal 2:',
  'Gambarkan grafik dari y = ½x - 2',
  'Penyelesaian:',
  '- x = 0 ⇒ y = -2 → titik (0, -2)',
  '- x = 4 ⇒ y = 0 → titik (4, 0)',
  '- Plot titik (0, -2) dan (4, 0), lalu hubungkan.'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'y = 3x + 2',
  'y = -2x + 4',
  'y = x - 1',
  'Tentukan dua titik dari masing-masing persamaan dan gambarkan grafiknya.',
  'Buat satu soal kontekstual (misalnya: biaya parkir per jam atau jarak tempuh kendaraan) dan sajikan grafiknya.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa yang kamu perhatikan dari bentuk grafik garis lurus?',
  'Bagaimana gradien memengaruhi arah grafik?',
  'Apakah kamu bisa membuat grafik dari persamaan yang kamu buat sendiri?',
  'Siswa diminta membuat satu persamaan garis lurus dari situasi nyata, menentukan dua titik, dan menggambarkan grafiknya di kertas atau aplikasi digital.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
