<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 20</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu melihat dua grafik garis yang berpotongan di suatu titik?',
  'Menurutmu, apa arti titik perpotongan dua grafik dalam suatu masalah nyata?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Menentukan titik temu dua rute perjalanan yang digambarkan dengan grafik.',
  'Mencari harga dua barang dengan melihat perpotongan grafik total harga.',
  'Menentukan waktu saat dua kegiatan berbeda menghasilkan jumlah yang sama.',
  'Membandingkan dua pilihan paket layanan melalui grafik biaya.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyelesaikan sistem persamaan linear dua variabel dengan metode grafik dan menginterpretasikan titik potong sebagai solusi dari sistem.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati dua persamaan linear yang disajikan dalam bentuk grafik.',
  'Siswa berdiskusi berkelompok untuk menentukan titik pada masing-masing grafik.',
  'Siswa menggambar grafik kedua persamaan dan menemukan titik potongnya.',
  'Siswa mengerjakan latihan untuk menyimpulkan solusi SPLDV dari grafik.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Apa itu Metode Grafik:',
  'Metode grafik adalah cara menyelesaikan SPLDV dengan menggambarkan kedua persamaan pada bidang koordinat dan menentukan titik potongnya sebagai solusi.',
  'Langkah-langkah:',
  'Ubah masing-masing persamaan ke bentuk eksplisit: y = mx + c.',
  'Tentukan dua titik untuk masing-masing garis.',
  'Gambar kedua garis pada bidang koordinat.',
  'Titik potong kedua garis adalah solusi SPLDV.',
  'Jenis Solusi Berdasarkan Grafik:',
  'Satu titik potong → satu solusi',
  'Garis berimpit → tak hingga solusi',
  'Garis sejajar → tidak ada solusi'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Selesaikan SPLDV berikut dengan metode grafik:',
  'y = 2x + 1',
  'y = -x + 4',
  'Penyelesaian:',
  'Garis pertama: titik (0,1) dan (1,3)',
  'Garis kedua: titik (0,4) dan (1,3)',
  'Titik potong: (1,3)',
  'Jawaban: (x, y) = (1, 3)',
  'Contoh Soal 2:',
  '2x + y = 6',
  'x - y = 1',
  'Langkah:',
  'Ubah ke bentuk eksplisit:',
  'y = 6 - 2x',
  'y = x - 1',
  'Tentukan titik-titik dan gambar grafik.',
  'Titik potong adalah solusi SPLDV.'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Selesaikan SPLDV berikut dengan metode grafik:',
  'y = 3x - 2',
  'y = -x + 6',
  'Buat grafik dari SPLDV berikut dan tentukan titik potongnya:',
  'x + y = 5',
  'x - y = 1',
  'Buat satu soal kontekstual (misalnya harga barang atau waktu kerja), susun SPLDV, lalu selesaikan dengan metode grafik.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Apa keuntungan menggunakan metode grafik dibanding metode lain?',
  'Bagaimana kamu memastikan akurasi saat menggambar grafik?',
  'Apakah kamu bisa menjelaskan solusi SPLDV dari grafik kepada temanmu?',
  'Siswa diminta membuat grafik dari SPLDV yang mereka susun sendiri, menentukan titik potong, dan menjelaskan makna solusi dalam konteks masalah.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
