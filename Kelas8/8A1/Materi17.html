<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 17</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu melihat masalah belanja atau pembagian tugas yang melibatkan dua jenis data sekaligus?',
  'Jika ada dua informasi yang saling berkaitan, bagaimana cara menuliskannya agar mudah dianalisis?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Menentukan harga dua jenis barang dari dua transaksi pembelian yang berbeda.',
  'Menghitung jumlah siswa laki-laki dan perempuan dari informasi total dan perbandingan.',
  'Menentukan kombinasi makanan atau paket pembelian dengan harga tertentu.',
  'Membandingkan jarak dan waktu dari dua rute perjalanan yang berbeda.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyusun sistem persamaan linear dua variabel (SPLDV) dari situasi nyata dan menjelaskan makna dari masing-masing variabel serta koefisien dalam konteks tersebut.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati permasalahan kontekstual yang melibatkan dua variabel berbeda.',
  'Siswa berdiskusi berkelompok untuk menentukan informasi penting dan variabel yang digunakan.',
  'Siswa menyusun dua persamaan linear dari situasi yang diberikan.',
  'Siswa mengerjakan latihan menyusun sistem persamaan linear dua variabel dari masalah sehari-hari.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Apa itu SPLDV:',
  'SPLDV adalah dua persamaan linear yang memiliki dua variabel dan saling berkaitan. Tujuannya adalah mencari nilai kedua variabel yang memenuhi kedua persamaan secara bersamaan.',
  'Bentuk Umum SPLDV:',
  'a₁x + b₁y = c₁',
  'a₂x + b₂y = c₂',
  'Langkah Menyusun SPLDV dari Masalah Kontekstual:',
  'Pahami situasi dan identifikasi dua variabel.',
  'Buat dua persamaan berdasarkan informasi yang diberikan.',
  'Tentukan bentuk SPLDV.'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Seorang pedagang menjual 2 jenis buah: apel dan jeruk.',
  '- 3 apel dan 2 jeruk seharga Rp20.000',
  '- 2 apel dan 4 jeruk seharga Rp22.000',
  'Pertanyaan:',
  'a. Tentukan SPLDV dari informasi di atas.',
  'b. Jelaskan arti dari masing-masing variabel.',
  'Penyelesaian:',
  'Misal:',
  'x = harga sebuah apel',
  'y = harga sebuah jeruk',
  '3x + 2y = 20000',
  '2x + 4y = 22000',
  'Contoh Soal 2:',
  'Dalam sebuah lomba, total skor dua peserta adalah 180.',
  '- Skor peserta A dua kali skor peserta B.',
  'Pertanyaan:',
  'a. Tentukan SPLDV dari informasi di atas.',
  'b. Tentukan nilai skor masing-masing peserta.',
  'Penyelesaian:',
  'Misal:',
  'x = skor peserta A',
  'y = skor peserta B',
  'x + y = 180',
  'x = 2y'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Seorang siswa membeli 4 pensil dan 3 buku seharga Rp31.000.',
  'Temannya membeli 2 pensil dan 5 buku seharga Rp39.000.',
  'a. Tentukan SPLDV',
  'b. Jelaskan arti dari masing-masing variabel',
  'Buat satu soal kontekstual sendiri yang melibatkan dua variabel, lalu:',
  'a. Tentukan SPLDV',
  'b. Jelaskan makna dari setiap komponen dalam persamaan'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Bagaimana kamu menentukan variabel dalam soal cerita?',
  'Apa tantangan dalam menyusun SPLDV dari situasi nyata?',
  'Apakah kamu bisa membuat sendiri soal SPLDV dari kehidupan sehari-hari?',
  'Siswa diminta menuliskan satu situasi nyata (misalnya: belanja, skor lomba, atau jumlah barang), lalu menyusun SPLDV berdasarkan situasi tersebut dan menjelaskan makna dari masing-masing variabel dan koefisien.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
