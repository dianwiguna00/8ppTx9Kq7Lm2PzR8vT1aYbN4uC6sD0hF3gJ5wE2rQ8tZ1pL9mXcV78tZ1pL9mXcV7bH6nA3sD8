<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pertemuan</title>

<style>
:root{
  --col-width:300px;
  --col-gap:30px;
}

/* RESET */
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* LAYOUT */
.layout{
  display:flex;
  gap:14px;
  padding:14px;
}

/* SIDEBAR */
.sidebar{
  width:22%;
  min-width:200px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.materi-header{
  background:#ffffffcc;
  border-radius:12px;
  padding:12px;
  font-weight:700;
  text-align:center;
}
button{
  padding:8px;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  text-align:left;
}
button.active{
  outline:3px solid #fff;
  box-shadow:0 0 0 4px rgba(255,255,255,.5);
}

/* WARNA TOMBOL */
.pemantik{background:#2980b9;}
.kontekstual{background:#8e44ad;}
.tujuan{background:#16a085;}
.aktivitas{background:#e67e22;}
.konsep{background:#27ae60;}
.contoh{background:#3498db;}
.latihan{background:#d35400;}
.refleksi{background:#c0392b;}
.nav{background:#34495e;}

/* MAIN */
.main{
  flex:1;
  background:#fff;
  border-radius:8px;
  padding:8px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
}

/* ✅ 2 KOLOM */
.content{
  height:600px;
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  column-count:2;
  column-gap:var(--col-gap);
  column-fill:auto;
  background:#fff;
}

/* SECTION */
.section{
  break-inside:avoid;
  margin-bottom:8px;
  padding:8px;
  border-radius:8px;
}
.section h3{margin:0 0 8px;}

/* WARNA SECTION */
.section.pemantik{background:#eaf3fb;}
.section.kontekstual{background:#f3eafd;}
.section.tujuan{background:#e9f7f1;}
.section.aktivitas{background:#fef3e6;}
.section.konsep{background:#eafaf1;}
.section.contoh{background:#ebf5fb;}
.section.latihan{background:#fdf2e9;}
.section.refleksi{background:#fdecea;}

.section p{
  margin:6px 0;
  font-size:20px;
  line-height:1.2;
}

/* GAMBAR */
.step-img{
  width:100%;
  border-radius:12px;
  margin:8px 0;
}

/* WATERMARK */
.watermark{
  position:absolute;
  bottom:14px;
  right:20px;
  font-weight:700;
  color:rgba(0,0,0,.15);
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <div class="materi-header">📘 Materi 2</div>

  <button class="pemantik active">💡 Pemantik</button>
  <button class="kontekstual">🌍 Kontekstual</button>
  <button class="tujuan">🎯 Tujuan</button>
  <button class="aktivitas">📚 Aktivitas</button>
  <button class="konsep">🧠 Konsep</button>
  <button class="contoh">✍️ Contoh</button>
  <button class="latihan">📝 Latihan</button>
  <button class="refleksi">🔍 Refleksi</button>

  <button class="nav" onclick="prevCol()">◀ Back</button>
  <button class="nav" onclick="nextCol()"> Next ▶</button>
</div>

<div class="main">
  <div class="watermark" id="wm">Kolom 1–2</div>
  <div class="content" id="content"></div>
</div>

</div>

<script>
/* DATA MATERI */

const materi = [
 {id:'pemantik', title:'💡 Pemantik', color:'pemantik', text:[
  'Pernahkah kamu menebak jumlah total tabungan setelah beberapa minggu tanpa menghitung satu per satu?',
  'Jika suatu pola angka terus berlanjut, bagaimana cara menuliskannya agar bisa digunakan untuk semua urutan?'
 ]},
 {id:'kontekstual', title:'🌍 Penerapan Kontekstual', color:'kontekstual', text:[
  'Pola tabungan mingguan yang bertambah dengan jumlah tetap setiap minggu.',
  'Jumlah kursi di barisan aula yang bertambah teratur setiap baris.',
  'Jumlah langkah pada tangga yang selalu bertambah dengan pola yang sama.',
  'Pola jumlah uang jajan yang meningkat secara teratur setiap hari.'
 ]},
 {id:'tujuan', title:'🎯 Tujuan Pembelajaran', color:'tujuan', text:[
  'Siswa mampu menyatakan pola bilangan dalam bentuk aljabar sederhana dan menggunakan bentuk tersebut untuk menentukan suku ke-n.'
 ]},
 {id:'aktivitas', title:'📚 Aktivitas Inti', color:'aktivitas', text:[
  'Siswa mengamati beberapa pola bilangan sederhana yang disajikan guru.',
  'Siswa berdiskusi berpasangan untuk mencari keteraturan dan menuliskannya dengan simbol.',
  'Siswa mencoba menuliskan pola bilangan dalam bentuk aljabar sederhana.',
  'Siswa mengerjakan latihan singkat untuk menentukan bentuk aljabar dari pola yang diberikan.'
 ]},
 {id:'konsep', title:'🧠 Pemahaman Konsep', color:'konsep', text:[
  'Mengapa Aljabar:',
  'Aljabar membantu kita menyatakan pola secara umum, bukan hanya melihat angka satu per satu. Dengan rumus aljabar, kita bisa langsung menemukan suku ke-n tanpa harus menuliskan semua suku sebelumnya.',
  'Contoh Pola Bilangan:',
  'Pola: 2, 4, 6, 8, 10, ...',
  'Pola ini bertambah 2 setiap suku.',
  'Rumus suku ke-n: Un = 2n',
  'Langkah Menyusun Rumus Aljabar:',
  '- Tentukan beda antar suku (untuk pola aritmetika).',
  '- Tentukan suku pertama.',
  '- Gunakan rumus umum: Un = a + (n - 1)d',
  'di mana:',
  '- a = suku pertama',
  '- d = beda antar suku',
  '- n = nomor suku'
 ]},
 {id:'contoh', title:'✍️ Contoh Soal', color:'contoh', text:[
  'Contoh Soal 1:',
  'Diberikan pola: 3, 6, 9, 12, ...',
  'Pertanyaan:',
  'a. Tentukan beda antar suku.',
  'b. Tentukan rumus suku ke-n.',
  'c. Hitung suku ke-10.',
  'Jawaban:',
  'a. Beda = 3',
  'b. Un = 3n',
  'c. U10 = 3 × 10 = 30',
  'Contoh Soal 2:',
  'Pola: 5, 8, 11, 14, ...',
  'Pertanyaan:',
  'a. Tentukan suku pertama dan beda.',
  'b. Tuliskan rumus suku ke-n.',
  'c. Hitung suku ke-15.',
  'Jawaban:',
  'a. a = 5, d = 3',
  'b. Un = 5 + (n - 1) × 3 = 3n + 2',
  'c. U15 = 3 × 15 + 2 = 47'
 ]},
 {id:'latihan', title:'📝 Latihan Soal', color:'latihan', text:[
  'Diberikan pola: 7, 10, 13, 16, ... tentukan rumus suku ke-n.',
  'Hitung suku ke-20 dari pola tersebut.',
  'Buat pola bilangan sendiri dan nyatakan dalam bentuk aljabar.',
  'Jelaskan bagaimana rumus aljabar mempermudah menemukan suku ke-n.'
 ]},
 {id:'refleksi', title:'🔍 Refleksi Pembelajaran', color:'refleksi', text:[
  'Bagaimana perasaanmu saat berhasil menemukan rumus suku ke-n?',
  'Apa manfaat menyatakan pola dalam bentuk aljabar?',
  'Apakah kamu bisa membuat pola sendiri dan menuliskan rumusnya?',
  'Siswa menuliskan satu pola bilangan yang mereka buat sendiri, lalu menyatakan rumus suku ke-n dan menjelaskan proses berpikirnya.'
 ]}
];

let iMateri=0,iStep=0;
const container=document.getElementById('content');

/* AKTIF TOMBOL */
function setActiveButton(id){
 document.querySelectorAll('.sidebar button').forEach(b=>b.classList.remove('active'));
 document.querySelector('.'+id)?.classList.add('active');
}

/* MAJU */

function showNext(){
 if(iMateri >= materi.length) return;

 const m = materi[iMateri];
 let s = document.getElementById(m.id);

 if(!s){
  s = document.createElement('div');
  s.className = `section ${m.color}`;
  s.id = m.id;
  s.innerHTML = `<h3>${m.title}</h3>`;
  container.appendChild(s);
  setActiveButton(m.id);
 }

 if(iStep < m.text.length){
  const raw = m.text[iStep++];

  // ✅ AMBIL SEMUA GAMBAR [[img:...]]
  const imgs = [...raw.matchAll(/\[\[img:(.+?)\]\]/g)];

  // ✅ AMBIL TEKS TANPA IMG
  const txt = raw.replace(/\[\[img:.+?\]\]/g,'').trim();

  // ✅ TAMPILKAN TEKS
  if(txt){
   const p = document.createElement('p');
   p.textContent = txt;
   s.appendChild(p);
  }

  // ✅ TAMPILKAN GAMBAR
  imgs.forEach(match=>{
   const img = document.createElement('img');
   img.src = match[1];           // contoh: img/1.jpg
   img.className = 'step-img';
   img.loading = 'lazy';
   img.onerror = ()=>{
     img.alt = 'Gambar tidak ditemukan: ' + match[1];
   };
   s.appendChild(img);
  });

 }else{
  iMateri++;
  iStep = 0;
  showNext();
 }
}


/* MUNDUR */
function showPrev(){
 if(iMateri<0) return;
 const m=materi[iMateri];
 const s=document.getElementById(m.id);
 if(s && s.children.length>1){
  s.removeChild(s.lastElementChild);
  iStep--;
  setActiveButton(m.id);
 }else if(iMateri>0){
  iMateri--;
  iStep=materi[iMateri].text.length;
  showPrev();
 }
}

/* NAV */
function nextCol(){showNext();}
function prevCol(){showPrev();}

/* TAP = MAJU */
document.addEventListener('pointerup',e=>{
 if(!e.target.closest('button')) showNext();
});
</script>

</body>
</html>
